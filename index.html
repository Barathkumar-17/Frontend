<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width">
        <title>Expense Tracker</title>
        <body>
            <h1>Expense Tracker</h1>
            <h2>Expenses :</h2>
            <p>
                <ul>
                    <li>
                        amount : 200
                        category : food
                        date : 06-07-2026
                    </li>
                    <li>
                        amount : 170
                        category : Travel
                        date : 02-07-2026
                    </li>
                    <li>
                        amount : 800
                        category : shopping
                        date : 01-07-2026
                    </li>
                </ul>
            </p>
            <h3>Add Expense:</h3>
            <p>
                <div>
                    <label for="amount">Amount:</label>
                    <input type="number" id = "amount" name = "amount" placeholder="Enter Amount Spent">
                </div>
                <div>
                    <label for="category">Category:</label>
                    <input type="text" id = "category" name = "category" placeholder="Enter category of expense">
                </div>
                <div>
                    <label for="date">Date:</label>
                    <input type="text" id = "date" name = "date" placeholder="Enter Date of expense">
                </div>
            </p>
            <p>
                <button type="submit">Add Expense</button>
            </p>
        </body>
    </head>
</html>
