<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width">
        <link rel="stylesheet" href="style.css">
        <title>Expense Tracker</title>
    </head>
        <body>
            <h1>Expense Tracker</h1>
            <h2>Expenses :</h2>
                <ul>
                    <li class="list">
                        amount : 200<br>
                        category : food<br>
                        date : 06-07-2026<br>
                    </li>
                    <li class="list">
                        amount : 170<br>
                        category : Travel<br>
                        date : 02-07-2026<br>
                    </li>
                    <li class="list">
                        amount : 800<br>
                        category : shopping<br>
                        date : 01-07-2026<br>
                    </li>
                </ul>
            
            <h3>Add Expense:</h3>
            <form>
                <div>
                    <label for="amount">Amount:</label>
                    <input type="number" id = "amount" name = "amount" placeholder="Enter Amount Spent">
                </div><br>
                <div>
                    <label for="category">Category:</label>
                    <input type="text" id = "category" name = "category" placeholder="Enter category of expense">
                </div><br>
                <div>
                    <label for="date">Date:</label>
                    <input type="text" id = "date" name = "date" placeholder="Enter Date of expense">
                </div><br>
                <div>
                <button type="submit">Add Expense</button>
                </div>
        </form>
        </body>
</html>
